<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Forgot Account - S4VOR</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      min-height: 100dvh;
      background: url("/S6.png") no-repeat center center fixed;
      background-size: cover;
      font-family: 'Arial Rounded MT Bold', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Top logo ── */
    .title-overlay {
      width: 100%;
      padding: 14px 0 8px;
      text-align: center;
      flex-shrink: 0;
    }

    .title-link {
      text-decoration: none;
      color: inherit;
    }

    .title-pickup {
      font-size: clamp(28px, 10vw, 40px);
      color: #0a5a2e;
      margin: 0;
      font-weight: 900;
      letter-spacing: 3px;
      text-shadow:
        0 3px 0 #c8e1c8,
        0 6px 0 #a8d1a8,
        0 9px 10px rgba(0,0,0,0.25);
    }

    /* ── Centered card area ── */
    .login-overlay {
      flex: 1;
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px 16px 40px;
    }

    /* ── Card ── */
    .login-box {
      background: rgba(255, 255, 255, 0.93);
      border-radius: 25px;
      padding: 36px 24px;
      box-shadow: 0 6px 25px rgba(0,0,0,0.3);
      text-align: center;
      width: 100%;
      max-width: 460px;
    }

    .card-heading {
      font-size: 15px;
      color: #555;
      margin: 0 0 20px;
      line-height: 1.5;
    }

    /* ── Input ── */
    .login-input {
      display: block;
      width: 100%;
      padding: 14px 13px;
      margin-bottom: 18px;
      border: none;
      border-radius: 10px;
      font-size: 16px;        /* prevents iOS auto-zoom */
      font-family: inherit;
      background-color: #fff;
      box-shadow: 0 0 5px rgba(0,0,0,0.1);
      transition: box-shadow 0.25s ease;
      -webkit-appearance: none;
      appearance: none;
    }

    .login-input:focus {
      outline: none;
      box-shadow: 0 0 10px rgba(17,143,84,0.4);
    }

    /* ── Button ── */
    .login-submit {
      background-color: #0a5a2e;
      color: white;
      border: none;
      border-radius: 25px;
      width: 100%;
      padding: 15px;
      font-size: 17px;
      font-family: inherit;
      font-weight: bold;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 4px;
    }

    .login-submit:hover  { background-color: #118f54; transform: scale(1.03); }
    .login-submit:active { transform: scale(0.97); background-color: #0d7f40; }

    /* ── Bottom links ── */
    .login-links {
      margin-top: 24px;
      font-size: 16px;
      display: flex;
      justify-content: center;
      gap: 32px;
      flex-wrap: wrap;
    }

    .login-links a {
      color: #0a5a2e;
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .login-links a:hover {
      text-decoration: underline;
      color: #118f54;
    }

    /* ── Tablet / desktop ── */
    @media (min-width: 520px) {
      .login-box {
        padding: 45px 52px;
      }

      .login-submit {
        width: auto;
        padding: 14px 40px;
        font-size: 20px;
      }

      .login-links {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>

  <div class="title-overlay">
    <a href="/index.html" class="title-link">
      <h1 class="title-pickup">SAVOR</h1>
    </a>
  </div>

  <div class="login-overlay">
    <div class="login-box">

      <p class="card-heading">Enter your email address and we'll send you a recovery link.</p>

      <input
        type="email"
        class="login-input"
        id="email"
        placeholder="Email"
        autocomplete="email"
        inputmode="email"
      >

      <button id="sendEmailBtn" class="login-submit">SEND RECOVERY EMAIL</button>

      <div class="login-links">
        <a href="login.html">Back to Login</a>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", function () {

      emailjs.init({ publicKey: "OpgxQEcmI8I90SyHp" });

      document.getElementById("sendEmailBtn").addEventListener("click", async () => {
        const userEmail = document.getElementById("email").value.trim();

        if (!userEmail) {
          alert("Please enter an email address.");
          return;
        }

        const params = {
          to_email: userEmail,
          message: "This is a test email!"
        };

        try {
          const res = await emailjs.send("service_1ijw1gl", "template_ob8fjmu", params);
          console.log("Email sent:", res);
          alert("Recovery email sent!");
        } catch (err) {
          console.error("Email failed:", err);
          alert("Email failed to send.");
        }
      });

    });
  </script>

</body>
</html>
