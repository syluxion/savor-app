<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>SAVOR Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />

  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: 'Arial Rounded MT Bold', sans-serif;
      overflow: hidden;
    }

    /* ── Full-screen map ── */
    #map {
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    /* ═══════════════════════════════════════
       TOP BAR  — search + account button
    ═══════════════════════════════════════ */
    .top-bar {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 8px;
      z-index: 9999;
      width: calc(100% - 20px);
      max-width: 680px;
    }

    .back-btn {
      background: #0a5a2e;
      color: white;
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      font-size: 20px;
      cursor: pointer;
      flex-shrink: 0;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 3px 10px rgba(0,0,0,0.25);
    }
    .back-btn:hover  { background: #118f54; }
    .back-btn:active { transform: scale(0.93); }

    .search-box {
      flex: 1;
      padding: 11px 18px;
      font-size: 15px;
      font-family: inherit;
      border-radius: 30px;
      border: none;
      outline: none;
      box-shadow: 0 3px 12px rgba(0,0,0,0.22);
      min-width: 0;
    }
    .search-box:focus { box-shadow: 0 0 0 2px rgba(17,143,84,0.5), 0 3px 12px rgba(0,0,0,0.22); }

    .search-btn {
      padding: 11px 18px;
      background: #0a5a2e;
      color: white;
      border: none;
      border-radius: 28px;
      cursor: pointer;
      font-size: 14px;
      font-family: inherit;
      font-weight: bold;
      transition: 0.2s;
      white-space: nowrap;
      box-shadow: 0 3px 10px rgba(0,0,0,0.25);
    }
    .search-btn:hover  { background: #118f54; transform: scale(1.04); }
    .search-btn:active { transform: scale(0.96); }

    .login-btn {
      padding: 11px 16px;
      background: #0a5a2e;
      color: white;
      border: none;
      border-radius: 28px;
      cursor: pointer;
      font-size: 14px;
      font-family: inherit;
      font-weight: bold;
      white-space: nowrap;
      flex-shrink: 0;
      transition: 0.2s;
      box-shadow: 0 3px 10px rgba(0,0,0,0.25);
    }
    .login-btn:hover  { background: #118f54; transform: scale(1.04); }
    .login-btn:active { transform: scale(0.96); }

    /* ═══════════════════════════════════════
       SIDEBAR  — desktop: left panel
                  mobile: bottom drawer
    ═══════════════════════════════════════ */
    .sidebar {
      position: absolute;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(6px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.25);
      overflow-y: auto;
      z-index: 9998;
      transition: transform 0.35s ease;
    }

    /* Desktop sidebar */
    @media (min-width: 600px) {
      .sidebar {
        left: 8px;
        top: 10px;
        width: 240px;
        height: calc(100dvh - 72px);
        border-radius: 20px;
        padding: 16px;
        transform: none !important; /* always visible on desktop */
      }
      .sidebar-toggle { display: none; }
      .sidebar-backdrop { display: none !important; }
    }

    /* Mobile bottom drawer */
    @media (max-width: 599px) {
      .sidebar {
        left: 0;
        right: 0;
        bottom: 0;
        height: 55dvh;
        border-radius: 22px 22px 0 0;
        padding: 0 16px 24px;
        transform: translateY(100%);  /* hidden by default */
      }

      .sidebar.is-open {
        transform: translateY(0);
      }

      /* drag handle */
      .sidebar::before {
        content: "";
        display: block;
        width: 40px;
        height: 4px;
        background: #ccc;
        border-radius: 2px;
        margin: 10px auto 14px;
      }

      /* Floating toggle button */
      .sidebar-toggle {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 9999;
        background: #0a5a2e;
        color: white;
        border: none;
        border-radius: 28px;
        padding: 12px 28px;
        font-size: 15px;
        font-family: inherit;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 4px 16px rgba(0,0,0,0.3);
        transition: 0.2s;
        white-space: nowrap;
      }
      .sidebar-toggle:active { transform: translateX(-50%) scale(0.96); }
      .sidebar-toggle.is-open { background: #b3261e; }

      /* semi-transparent backdrop behind drawer */
      .sidebar-backdrop {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.3);
        z-index: 9997;
        display: none;
      }
      .sidebar-backdrop.is-visible { display: block; }
    }

    .sidebar h2 {
      text-align: center;
      font-size: 22px;
      margin: 0 0 14px;
      color: #0a5a2e;
    }

    .sidebar ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .sidebar ul li {
      padding: 12px;
      background: rgba(183,242,176,0.6);
      border-radius: 15px;
      margin-bottom: 10px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
      color: #0a5a2e;
      transition: 0.2s;
    }
    .sidebar ul li:hover  { background: rgba(198,255,198,0.9); transform: scale(1.02); }
    .sidebar ul li:active { transform: scale(0.98); }

    /* ═══════════════════════════════════════
       INFO CARDS  — restaurant + food bank
       Desktop: fixed right panel
       Mobile:  bottom sheet above drawer toggle
    ═══════════════════════════════════════ */
    .info-card {
      position: absolute;
      background: rgba(255,255,255,0.95);
      border-radius: 22px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.25);
      backdrop-filter: blur(6px);
      display: none;
      z-index: 99999;
      padding: 14px;
    }

    /* Desktop: right side */
    @media (min-width: 600px) {
      .info-card {
        top: 72px;
        right: 16px;
        width: 250px;
      }
    }

    /* Mobile: anchored above bottom toggle button */
    @media (max-width: 599px) {
      .info-card {
        left: 10px;
        right: 10px;
        bottom: 76px;
        width: auto;
      }
    }

    .info-card img {
      width: 100%;
      height: 110px;
      object-fit: cover;
      border-radius: 14px;
    }

    .info-card h3 {
      margin: 4px 0;
      color: #0a5a2e;
      font-size: 18px;
      text-align: center;
    }

    .info-rating {
      text-align: center;
      font-size: 18px;
      color: #ffb400;
    }

    .info-hours {
      text-align: center;
      font-size: 14px;
      color: #0a5a2e;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .info-address {
      text-align: center;
      font-size: 13px;
      color: #333;
      line-height: 1.3;
      margin-bottom: 10px;
    }

    .info-action-btn {
      width: 100%;
      padding: 11px;
      background: #0a5a2e;
      color: white;
      border: none;
      border-radius: 18px;
      font-size: 16px;
      font-family: inherit;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }
    .info-action-btn:hover  { background: #118f54; transform: scale(1.04); }
    .info-action-btn:active { transform: scale(0.97); }

    /* ================= ROUTING ================= */
    .leaflet-routing-container {
      background: rgba(255,255,255,0.95) !important;
      border-radius: 18px !important;
      box-shadow: 0 8px 25px rgba(0,0,0,0.25) !important;
      width: 260px !important;
      overflow: hidden !important;
      border: none !important;
      z-index: 999999 !important;
    }

    .leaflet-routing-alt,
    .leaflet-routing-geocoders,
    .leaflet-routing-add-waypoint,
    .leaflet-routing-error {
      display: none !important;
    }

    .info-card-close {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 28px;
      height: 28px;
      background: #0a5a2e;
      border: none;
      border-radius: 50%;
      font-size: 15px;
      line-height: 1;
      cursor: pointer;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
      z-index: 2;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }
    .info-card-close:hover { background: #118f54; }

    .info-img-wrap {
      position: relative;
      width: 100%;
      margin-bottom: 8px;
    }
    .info-img-wrap img {
      width: 100%;
      height: 110px;
      object-fit: cover;
      border-radius: 14px;
      display: block;
      margin-bottom: 0;
    }
  </style>
</head>
<body>

  <!-- Full-screen map -->
  <div id="map"></div>

  <!-- Sidebar backdrop (mobile only) -->
  <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

  <!-- Top bar: back + search + login -->
  <div class="top-bar">
    <button class="back-btn" onclick="backPress()" aria-label="Back">←</button>
    <input id="searchInput" class="search-box" placeholder="Search restaurants…" enterkeyhint="search" />
    <button id="searchBtn" class="search-btn">SEARCH</button>
    <button class="login-btn" onclick="handleLogin()">ACCOUNT</button>
  </div>

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <h2>Restaurants</h2>
    <ul id="restaurantList"></ul>
  </div>

  <!-- Sidebar toggle (mobile only) -->
  <button class="sidebar-toggle" id="sidebarToggle">☰ Restaurants</button>

  <!-- Restaurant info card -->
  <div class="info-card" id="restaurant-info-box">
    <div class="info-img-wrap">
      <button class="info-card-close" onclick="closeInfoCards()" aria-label="Close">✕</button>
      <img id="info-img" alt="Restaurant image" />
    </div>
    <h3 id="info-name"></h3>
    <div class="info-rating" id="info-rating"></div>
    <p class="info-hours" id="info-hours"></p>
    <p class="info-address" id="info-address">Loading address…</p>
    <button class="info-action-btn" id="order-btn">ORDER</button>
  </div>

  <!-- Food bank info card -->
  <div class="info-card" id="fb-info-box">
    <div class="info-img-wrap">
      <button class="info-card-close" onclick="closeInfoCards()" aria-label="Close">✕</button>
      <img id="fb-info-img" alt="Food bank image" />
    </div>
    <h3 id="fb-info-name"></h3>
    <div class="info-rating" id="fb-info-rating"></div>
    <p class="info-hours" id="fb-info-hours"></p>
    <p class="info-address" id="fb-info-address">Loading address…</p>
    <button class="info-action-btn" id="fb-dir-btn">Directions</button>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.min.js"></script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";

    const firebaseConfig = { databaseURL: "https://savordatabase-default-rtdb.firebaseio.com" };
    const app = initializeApp(firebaseConfig);
    const savorDB = getDatabase(app);

    const map = L.map("map").setView([34.241461, -118.529286], 15);
    const dateRef = new Date().toLocaleString('en-us', { weekday: 'long' });

    // ── Navigation ──
    window.backPress  = function () { sessionStorage.removeItem("query"); window.location.href = '/index.html'; };
    window.resPage    = function () { window.location.href = 'checkoutmenu.html'; };
    window.closeInfoCards = function () {
      document.getElementById("restaurant-info-box").style.display = "none";
      document.getElementById("fb-info-box").style.display = "none";
    };

    // ── Mobile sidebar toggle ──
    const sidebar        = document.getElementById("sidebar");
    const sidebarToggle  = document.getElementById("sidebarToggle");
    const sidebarBackdrop = document.getElementById("sidebarBackdrop");

    function openSidebar() {
      sidebar.classList.add("is-open");
      sidebarToggle.classList.add("is-open");
      sidebarToggle.textContent = "✕ Close";
      sidebarBackdrop.classList.add("is-visible");
    }
    function closeSidebar() {
      sidebar.classList.remove("is-open");
      sidebarToggle.classList.remove("is-open");
      sidebarToggle.textContent = "☰ Restaurants";
      sidebarBackdrop.classList.remove("is-visible");
    }

    sidebarToggle.addEventListener("click", () => {
      sidebar.classList.contains("is-open") ? closeSidebar() : openSidebar();
    });
    sidebarBackdrop.addEventListener("click", closeSidebar);

    // ── Map tiles ──
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", { maxZoom: 19 }).addTo(map);

    let markers       = [];
    let restaurantData = [];
    let routingControl = null;
    let userLocation   = null;

    function formatRatingStars(rating) {
      const rounded = Math.round(rating);
      return "★".repeat(rounded) + "☆".repeat(5 - rounded);
    }

    async function fetchAddress(lat, lng) {
      try {
        const res = await fetch(
          `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`,
          { headers: { "User-Agent": "S4VOR-Student-Project" } }
        );
        const data = await res.json();
        return data.display_name || "Address not available";
      } catch (err) {
        console.error("Address lookup failed", err);
        return "Address not available";
      }
    }

    async function loadRestaurants() {
      const res  = await get(ref(savorDB, `rest/`));
      const data = res.val();
      if (!data) return;

      restaurantData = Object.entries(data).map(([id, r]) => ({ id, ...r }));
      populateSidebar(restaurantData);
      addRestaurantsToMap(restaurantData);
      queryFromURL();
    }
    loadRestaurants();

    navigator.geolocation?.getCurrentPosition(
      pos  => userLocation = [pos.coords.latitude,  pos.coords.longitude],
      ()   => userLocation = [34.241461, -118.529286]
    );

    function addRestaurantsToMap(restaurants) {
      markers.forEach(m => map.removeLayer(m));
      markers = [];

      const icon = L.icon({
        iconUrl: "https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-green.png",
        iconSize: [25, 41],
        iconAnchor: [12, 41]
      });

      restaurants.forEach(r => {
        const marker = L.marker([r.lat, r.lng], { icon }).addTo(map);
        marker.bindPopup(`<b style="color:#0a5a2e">${r.id}</b>`);
        marker.on("click", () => { updateInfoBox(r); startRouting(r); });
        markers.push(marker);
      });
    }

    function startRouting(r) {
      if (!userLocation) return;
      routingControl && map.removeControl(routingControl);
      routingControl = L.Routing.control({
        waypoints: [L.latLng(userLocation), L.latLng(r.lat, r.lng)],
        addWaypoints: false,
        draggableWaypoints: false
      }).addTo(map);
    }

    function populateSidebar(restaurants) {
      const list = document.getElementById("restaurantList");
      list.innerHTML = "";
      restaurants.forEach(r => {
        const li = document.createElement("li");
        li.textContent = r.id;
        li.onclick = () => {
          map.setView([r.lat, r.lng], 15);
          updateInfoBox(r);
          startRouting(r);
          closeSidebar();   // auto-close drawer on mobile after selection
        };
        list.appendChild(li);
      });
    }

    function updateInfoBox(r) {
      document.getElementById("restaurant-info-box").style.display = "none";
      document.getElementById("fb-info-box").style.display = "none";

      if (r.type === "Food Bank") {
        const box = document.getElementById("fb-info-box");
        box.style.display = "block";
        document.getElementById("fb-info-img").src          = r.image;
        document.getElementById("fb-info-name").innerText   = r.id;
        document.getElementById("fb-info-rating").innerText = `${formatRatingStars(r.rating)} (${r.rating.toFixed(1)})`;
        document.getElementById("fb-info-hours").innerText  = r.hours?.[dateRef] ?? "Hours not available";

        const addrEl = document.getElementById("fb-info-address");
        addrEl.innerText = "Loading address…";
        fetchAddress(r.lat, r.lng).then(a => addrEl.innerText = a);

        document.getElementById("fb-dir-btn").onclick = () => {
          sessionStorage.setItem("currRest", r.id);
          getDirections();
        };
      } else {
        const box = document.getElementById("restaurant-info-box");
        box.style.display = "block";
        document.getElementById("info-img").src          = r.image;
        document.getElementById("info-name").innerText   = r.id;
        document.getElementById("info-rating").innerText = `${formatRatingStars(r.rating)} (${r.rating.toFixed(1)})`;
        document.getElementById("info-hours").innerText  = r.hours?.[dateRef] ?? "Hours not available";

        const addrEl = document.getElementById("info-address");
        addrEl.innerText = "Loading address…";
        fetchAddress(r.lat, r.lng).then(a => addrEl.innerText = a);

        document.getElementById("order-btn").onclick = () => {
          sessionStorage.setItem("currRest", r.id);
          resPage();
        };
      }
    }

    window.handleLogin = async function(){
      const userId = localStorage.getItem("loggedInUser");
      if (!userId){
        window.location.href = "/login.html";
        return;
      };

      const userSnap = await get(ref(savorDB, `user/${userId}`));
      const userData = userSnap.val();
      const type = userData?.accountType;

      if (type === "fb") {
        sessionStorage.setItem("ownedRest", userData.rest ?? "");
        window.location.href = "/fb_acc.html";
      }
      else if (type === "business") {
        sessionStorage.setItem("ownedRest", userData.rest ?? "");
        window.location.href = "/res_dash.html";
      }
      else
      {
        window.location.href = "/user_acc.html";
      }
    }

    window.getDirections = async function() {
  const restName = sessionStorage.getItem("currRest");
  const restRef = ref(savorDB, `rest/${restName}`);
  const restSnap = await get (restRef);
  const r = restSnap.val();

  const { lat, lng } = r;

  // Use coordinates directly — no fetchAddress needed, works on all browsers
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
  const isAndroid = /Android/.test(navigator.userAgent);

  if (isIOS) {
    // Try Apple Maps deep link first (opens Maps app on iOS)
    // Fallback: Google Maps app via comgooglemaps://, then browser
    const appleMapsUrl = `maps://?daddr=${lat},${lng}`;
    const googleMapsAppUrl = `comgooglemaps://?daddr=${lat},${lng}`;
    const googleMapsBrowserUrl = `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`;

    // Try to open Google Maps app; if not installed, fall back to Apple Maps, then browser
    const start = Date.now();
    window.location.href = googleMapsAppUrl;

    setTimeout(() => {
      if (Date.now() - start < 1500) {
        // Google Maps app didn't open, try Apple Maps
        window.location.href = appleMapsUrl;
      }
    }, 500);

    setTimeout(() => {
      if (Date.now() - start < 2000) {
        // Neither app opened, fall back to browser
        window.open(googleMapsBrowserUrl, '_blank');
      }
    }, 1000);

  } else if (isAndroid) {
    // Android: use geo: URI which prompts user to choose their maps app
    // Falls back to Google Maps browser if no app handles it
    const geoUrl = `geo:${lat},${lng}?q=${lat},${lng}`;
    const googleMapsBrowserUrl = `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`;

    const start = Date.now();
    window.location.href = geoUrl;

    setTimeout(() => {
      if (Date.now() - start < 1500) {
        window.open(googleMapsBrowserUrl, '_blank');
      }
    }, 1000);

  } else {
    // Desktop: open in browser tab, works on Chrome, Safari, Firefox, Edge
    window.open(
      `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`,
      '_blank'
    );
  }
}

    // ── Search ──
    const searchInput = document.getElementById("searchInput");
    const searchBtn   = document.getElementById("searchBtn");

    function filter(query) {
      const q = query.toLowerCase().trim();
      if (!q) {
        populateSidebar(restaurantData);
        addRestaurantsToMap(restaurantData);
        return;
      }
      const filtered = restaurantData.filter(r =>
        r.id?.toLowerCase().includes(q) || r.type?.toLowerCase().includes(q)
      );
      populateSidebar(filtered);
      addRestaurantsToMap(filtered);
    }

    function queryFromURL() {
      const params = new URLSearchParams(window.location.search);
      const query  = params.get("query");
      if (!query) return;
      searchInput.value = query;
      filter(query);
    }

    searchInput.oninput = e  => filter(e.target.value);
    searchBtn.onclick   = () => filter(searchInput.value);
  </script>
</body>
</html>
